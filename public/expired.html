<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Expired — piik.me</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #fff;
        }
        .card {
            text-align: center;
            padding: 48px 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            max-width: 480px;
            width: 90%;
        }
        .icon { font-size: 64px; margin-bottom: 24px; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
        p { color: rgba(255,255,255,0.6); font-size: 15px; line-height: 1.6; margin-bottom: 32px; }
        a {
            display: inline-block;
            padding: 12px 28px;
            background: #8b5cf6;
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
        }
        a:hover { background: #7c3aed; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔗</div>
        <h1>Link Expired</h1>
        <p>This link is no longer active. It either reached its click limit or passed its expiry date.</p>
        <a href="/">Create your own short link →</a>
    </div>
</body>
</html>
